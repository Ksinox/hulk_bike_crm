name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          # ОБЯЗАТЕЛЬНО: указываем адрес прод-API, иначе Electron-бандл
          # зашивает дефолт http://localhost:4000 и при запуске у клиента
          # fetch падает → пустой экран входа (тайлы не загружаются).
          VITE_API_URL: https://api.hulkbike.ru
        run: pnpm --filter web build

      - name: Build electron main
        run: pnpm --filter desktop build:electron

      - name: Build installer + publish to GitHub Releases
        run: pnpm --filter desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
