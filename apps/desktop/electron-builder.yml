appId: ru.hulkbike.crm
productName: Халк Байк CRM
copyright: Copyright © 2026 Халк Байк

directories:
  output: release
  buildResources: build

files:
  - "dist/**/*"
  - "package.json"

extraResources:
  - from: "../web/dist"
    to: "web"

# Windows: web-installer (лёгкий .exe докачивающий пакет с GitHub Releases)
win:
  target:
    - target: nsis-web
      arch: [x64]
  artifactName: "HulkBikeCRM-Web-Setup-${version}.${ext}"
  # Code signing — включить когда появится сертификат:
  # certificateFile: path/to/cert.pfx
  # certificatePassword: ${env.WIN_CSC_KEY_PASSWORD}

nsisWeb:
  # one-click: без мастера, без выбора каталога — устанавливается сразу в %LOCALAPPDATA%
  oneClick: true
  # per-user: без UAC, без системного диалога «для кого устанавливать»
  perMachine: false
  allowToChangeInstallationDirectory: false
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Халк Байк CRM
  # После установки обновления — запустить приложение автоматически
  runAfterFinish: true
  # Отключаем возможность удалить из Панели управления с запросами
  deleteAppDataOnUninstall: false

publish:
  - provider: github
    owner: Ksinox
    repo: hulk_bike_crm
    releaseType: release
