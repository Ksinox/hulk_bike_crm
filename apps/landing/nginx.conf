# nginx для статического лендинга hulkbike.ru.
# Никакого SPA-fallback — это одна страница.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # index.html не кешируем — чтобы при правках лендинга юзер сразу
  # получал свежую разметку (и подменённый __API_URL__).
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = / {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Любая статика рядом (логотипы, og-картинки) кешируем надолго.
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;
}
