# nginx для раздачи SPA. SPA-fallback: любой неизвестный путь → index.html.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Ассеты с хешами в имени кешируем надолго
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # index.html никогда не кешируем — чтобы после деплоя пользователь
  # сразу получал свежий bundle-hash
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # version.json используется для уведомления о новой версии (web-updater)
  location = /version.json {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Любой клиентский роут → index.html (React Router / наш in-app switch)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # gzip для текстовых ресурсов
  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
}
