<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- maximum-scale=1 + user-scalable=no: запрещаем зум на телефоне —
         мобильное приложение не масштабируется пинчем (иначе страница
         «уезжает» вбок и кажется «макетом под больший экран»).
         viewport-fit=cover: env(safe-area-inset-*) получают реальные
         значения (отступы под «чёлку» / домашнюю полоску). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Халк Байк CRM</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
